    <script>
    window.onload = () => {
    const pageFlip = new St.PageFlip(document.getElementById('magazine'), {
        width: 400, 
        height: 600, 
        size: "fixed",
       
        // Menambah bayangan biar keren
        drawShadow: true,

        // Batas ukuran
        minWidth: 200,
        maxWidth: 800, // Maksimal lebar 2 halaman (400x2)
        minHeight: 300,
        maxHeight: 1200,

        showCover: true,
        usePortrait: true, // true = 1 halaman, false = 2 halaman (di HP)
        mobileScrollSupport: true,
        flippingTime: 800, // Kecepatan flip, semakin tinggi semakin lama

    });

      pageFlip.loadFromHTML(document.querySelectorAll('.page'));
    };
    </script>
